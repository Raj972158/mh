<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        background: black;
        font-family: Arial, sans-serif;
        color: white;

        /* PERFECT CENTER */
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .container {
        width: 100%;
        max-width: 400px;
        padding: 20px;
    }

    .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid white;
    }

    h1 {
        margin-top: 15px;
        font-size: 26px;
    }

    .bold-line {
        margin-top: 10px;
        font-size: 18px;
        font-weight: bold;
    }

    .normal-line {
        margin-top: 6px;
        font-size: 15px;
        color: #ccc;
    }

    .download-btn {
        display: inline-block;
        margin-top: 25px;
        padding: 16px 35px;
        font-size: 20px;
        font-weight: bold;
        color: white;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        border-radius: 50px;
        text-decoration: none;
        box-shadow: 0 0 20px rgba(0, 114, 255, 0.9);
        transition: 0.3s;
    }

    .download-btn:hover {
        transform: scale(1.07);
    }

    /* BOX (Button ke neeche) */
    .highlight-box {
        margin-top: 15px;
        padding: 12px;
        background: rgba(255,255,255,0.08);
        border-radius: 10px;
        font-size: 14px;
    }

    .custom-line {
        margin-top: 20px;
        font-size: 14px;
        color: #aaa;
    }

    .footer {
        margin-top: 15px;
        font-size: 13px;
    }

    .footer a {
        color: #00c6ff;
        text-decoration: none;
    }

</style>
</head>

<body>

<div class="container">

    <!-- 🔴 IMAGE -->
    <img src="your-image.jpg" class="profile-img">

    <!-- 🔴 NAME -->
    <h1>Your Name</h1>

    <!-- 🔴 TEXT -->
    <div class="bold-line">यहाँ आपका मोटा टेक्स्ट</div>
    <div class="normal-line">यहाँ आपका नॉर्मल टेक्स्ट</div>

    <!-- 🔴 BUTTON -->
    <a href="YOUR-DOWNLOAD-LINK" class="download-btn">
        ⬇️ DOWNLOAD NOW ⬇️
    </a>

    <!-- 🔴 BUTTON KE DIRECT NEECHE BOX -->
    <div class="highlight-box">
        🔒 100% Secure <br>
        ⚡ Instant Result | Fast Payout
    </div>

    <!-- 🔴 CUSTOM LINE -->
    <div class="custom-line">
        यहाँ आप अपनी लाइन लिख सकते हैं
    </div>

    <!-- 🔴 FOOTER -->
    <div class="footer">
        Advertised by 
        <a href="https://example.com" target="_blank">Seven</a>
    </div>

</div>

</body>
</html>
