<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: black;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    .container {
        padding: 40px 20px;
    }

    /* Profile Image */
    .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid white;
    }

    h1 {
        margin-top: 15px;
        font-size: 28px;
    }

    .bold-line {
        font-weight: bold;
        margin-top: 10px;
        font-size: 18px;
    }

    .normal-line {
        margin-top: 8px;
        font-size: 16px;
        color: #ccc;
    }

    /* Download Button */
    .download-btn {
        display: inline-block;
        margin-top: 25px;
        padding: 15px 30px;
        font-size: 20px;
        font-weight: bold;
        color: white;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        border-radius: 50px;
        text-decoration: none;
        box-shadow: 0 0 15px rgba(0, 114, 255, 0.8);
        transition: 0.3s;
    }

    .download-btn:hover {
        transform: scale(1.05);
    }

    /* Highlight Box */
    .highlight-box {
        margin-top: 30px;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        display: inline-block;
    }

    .custom-line {
        margin-top: 30px;
        font-size: 14px;
        color: #aaa;
    }

    /* Footer Link */
    .footer {
        margin-top: 20px;
        font-size: 14px;
    }

    .footer a {
        color: #00c6ff;
        text-decoration: none;
    }

</style>
</head>

<body>

<div class="container">

    <!-- 🔴 यहाँ अपनी JPG फोटो का लिंक डालना -->
    <img src="your-image.jpg" alt="Profile" class="profile-img">

    <!-- 🔴 यहाँ अपना नाम लिखना -->
    <h1>Your Name</h1>

    <!-- 🔴 Bold लाइन -->
    <div class="bold-line">यहाँ आपका मोटा टेक्स्ट आएगा</div>

    <!-- 🔴 Normal लाइन -->
    <div class="normal-line">यहाँ आपका नॉर्मल टेक्स्ट आएगा</div>

    <!-- 🔴 Download Button -->
    <!-- यहाँ लिंक डालना -->
    <a href="YOUR-DOWNLOAD-LINK" class="download-btn" download>
        ⬇️ DOWNLOAD NOW ⬇️
    </a>

    <!-- Highlight Section -->
    <div class="highlight-box">
        🔒 100% Secure <br>
        ⚡ Instant Result | Fast Payout
    </div>

    <!-- Custom Line -->
    <div class="custom-line">
        यहाँ आप अपनी लाइन लिख सकते हैं
    </div>

    <!-- Footer -->
    <div class="footer">
        Advertised by 
        <!-- 🔴 यहाँ क्लिक करने पर दूसरा पेज खुलेगा -->
        <a href="https://example.com" target="_blank">Seven</a>
    </div>

</div>

</body>
</html>
